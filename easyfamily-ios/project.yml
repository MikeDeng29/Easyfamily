name: EasyfamilyApp
options:
  bundleIdPrefix: com.easyfamily
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO

targets:
  EasyfamilyApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: EasyfamilyApp
        excludes:
          - "Info.plist"
    info:
      path: EasyfamilyApp/Info.plist
      properties:
        CFBundleDisplayName: easyfamily
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSMicrophoneUsageDescription: "用于语音输入消息"
        NSSpeechRecognitionUsageDescription: "用于将语音转换为文字消息"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.easyfamily.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: 7BK7GP7V5N
        CODE_SIGN_STYLE: Automatic

  EasyfamilyAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: EasyfamilyAppUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.easyfamily.ios.uitests
        DEVELOPMENT_TEAM: 7BK7GP7V5N
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: EasyfamilyApp
    dependencies:
      - target: EasyfamilyApp
