openapi: 3.0.3
info:
  title: Easyfamily API Contract
  version: 0.1.0
  description: |
    Contract-first API definition for Easyfamily backend.
    All successful and business-failed responses follow ApiResponse envelope.
    Public error codes are client-facing only and never expose internal exception codes.
servers:
  - url: http://localhost:8080
tags:
  - name: Auth
  - name: Query
  - name: Phone
  - name: Family
  - name: Admin
security:
  - bearerAuth: []
paths:
  /api/v1/auth/captcha/verify:
    post:
      tags: [Auth]
      summary: Verify captcha ticket and issue captcha token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptchaVerifyRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCaptchaToken'

  /api/v1/auth/captcha/slide/init:
    post:
      tags: [Auth]
      summary: Initialize slide captcha challenge
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlideCaptchaInitRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSlideCaptchaInit'

  /api/v1/auth/captcha/slide/verify:
    post:
      tags: [Auth]
      summary: Verify slide captcha and issue captcha token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlideCaptchaVerifyRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCaptchaToken'

  /api/v1/auth/sms/send:
    post:
      tags: [Auth]
      summary: Send SMS code for login/register
      description: >-
        captchaToken is optional for normal requests. If the same phone number
        or client IP has requested an SMS code 2 or more times within the last
        10 minutes and no valid captchaToken is supplied, the response is a
        business error with code CAPTCHA_REQUIRED. The client should then run
        the slide captcha flow to obtain a captchaToken and retry with it.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsSendRequest'
      responses:
        '200':
          description: Api response (or CAPTCHA_REQUIRED business error when risk control is triggered)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login (and implicit registration on first login)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLogin'

  /api/v1/auth/admin/login:
    post:
      tags: [Auth]
      summary: Admin login by username/password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLogin'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access/refresh token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRefresh'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke tokens
      parameters:
        - in: header
          name: Authorization
          required: false
          schema:
            type: string
            example: Bearer eyJhbGciOi...
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  /api/v1/query/phone-binding:
    post:
      tags: [Query]
      summary: Query binding status for a bound phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindingQueryRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBindingQuery'
        '401':
          description: Missing/invalid access token

  /api/v1/phones/mine:
    get:
      tags: [Phone]
      summary: List current user's phones
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePhoneList'
        '401':
          description: Missing/invalid access token

  /api/v1/phones/bind:
    post:
      tags: [Phone]
      summary: Bind a secondary phone (requires SMS verification code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneBindRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          description: Missing/invalid access token

  /api/v1/phones/unbind:
    post:
      tags: [Phone]
      summary: Unbind a non-primary phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneUnbindRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          description: Missing/invalid access token

  /api/v1/phones/primary:
    post:
      tags: [Phone]
      summary: Set one bound phone as primary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneSetPrimaryRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          description: Missing/invalid access token

  /api/v1/family/members:
    get:
      tags: [Family]
      summary: List current user's family members
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFamilyMemberList'
        '401':
          description: Missing/invalid access token
    post:
      tags: [Family]
      summary: Create a family member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FamilyMemberCreateRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFamilyMember'
        '401':
          description: Missing/invalid access token

  /api/v1/family/members/{memberId}:
    get:
      tags: [Family]
      summary: Get one family member
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFamilyMember'
        '401':
          description: Missing/invalid access token
    put:
      tags: [Family]
      summary: Update one family member
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FamilyMemberUpdateRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFamilyMember'
        '401':
          description: Missing/invalid access token
    delete:
      tags: [Family]
      summary: Delete one family member
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          description: Missing/invalid access token

  /api/v1/user/profile:
    get:
      tags: [User]
      summary: Get current user's profile (userId, phone, nickname)
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserProfile'
        '401':
          description: Missing/invalid access token
    put:
      tags: [User]
      summary: Update current user's nickname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNicknameRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserProfile'
        '400':
          description: Invalid nickname (must be 1-20 characters)
        '401':
          description: Missing/invalid access token

  /api/v1/user/butler:
    put:
      tags: [User]
      summary: Partially update current user's AI butler identity (name, avatar, persona)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateButlerRequest'
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserProfile'
        '401':
          description: Missing/invalid access token

  /api/v1/memory:
    get:
      tags: [Memory]
      summary: List current user's saved AI assistant memories (most recent first)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMemoryList'
        '401':
          description: Missing/invalid access token

  /api/v1/memory/{id}:
    delete:
      tags: [Memory]
      summary: Delete one of the current user's AI assistant memories
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          description: Missing/invalid access token

  /api/v1/admin/reports/dau:
    get:
      tags: [Admin]
      summary: DAU report
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDauReport'
        '401':
          description: Missing/invalid access token

  /api/v1/admin/reports/feature-hot:
    get:
      tags: [Admin]
      summary: Feature hot report
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFeatureHotReport'
        '401':
          description: Missing/invalid access token

  /api/v1/admin/reports/query-overview:
    get:
      tags: [Admin]
      summary: Query overview report
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseQueryOverview'
        '401':
          description: Missing/invalid access token

  /api/v1/admin/query-settings:
    get:
      tags: [Admin]
      summary: Get runtime query settings
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseQuerySettings'
        '401':
          description: Missing/invalid access token

  /api/v1/admin/quota:
    patch:
      tags: [Admin]
      summary: Update runtime query quota/settings
      parameters:
        - in: query
          name: dailyQuotaPerUser
          schema:
            type: integer
            minimum: 1
        - in: query
          name: dailyQuotaPerPhone
          schema:
            type: integer
            minimum: 1
        - in: query
          name: dailyQuotaPerIp
          schema:
            type: integer
            minimum: 1
        - in: query
          name: preferRedisCache
          schema:
            type: boolean
        - in: query
          name: providerKey
          schema:
            type: string
        - in: query
          name: providerTimeoutMs
          schema:
            type: integer
            minimum: 100
        - in: query
          name: providerRetryTimes
          schema:
            type: integer
            minimum: 0
        - in: query
          name: providerCircuitFailureThreshold
          schema:
            type: integer
            minimum: 1
        - in: query
          name: providerCircuitOpenSeconds
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Api response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseQuerySettings'
        '401':
          description: Missing/invalid access token

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponseVoid:
      type: object
      properties:
        code:
          type: string
          example: OK
        message:
          type: string
          example: success
        data:
          nullable: true
      required: [code, message]

    ApiResponseError:
      type: object
      description: Public error response. Internal exception codes are never returned to clients.
      properties:
        code:
          type: string
          enum:
            - BAD_REQUEST
            - UNAUTHORIZED
            - FORBIDDEN
            - AUTH_FAILED
            - PHONE_ERROR
            - QUOTA_EXCEEDED
            - SERVICE_UNAVAILABLE
            - INTERNAL_ERROR
            - BIZ_ERROR
            - CAPTCHA_REQUIRED
          example: AUTH_FAILED
        message:
          type: string
          example: 登录状态已过期，请重新登录
        data:
          nullable: true
      required: [code, message]

    ApiResponseCaptchaToken:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          type: object
          properties:
            captchaToken: { type: string, example: mock-1b5c2db8-a957-4f54-b31f-40bc8eb0e5a2 }
          required: [captchaToken]
      required: [code, message, data]

    ApiResponseSlideCaptchaInit:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          $ref: '#/components/schemas/SlideCaptchaInitResponse'
      required: [code, message, data]

    ApiResponseLogin:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          $ref: '#/components/schemas/LoginResponse'
      required: [code, message, data]

    ApiResponseRefresh:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          $ref: '#/components/schemas/RefreshResponse'
      required: [code, message, data]

    ApiResponseBindingQuery:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          $ref: '#/components/schemas/BindingQueryResponse'
      required: [code, message, data]

    ApiResponseUserProfile:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          $ref: '#/components/schemas/UserProfile'
      required: [code, message, data]

    ApiResponsePhoneList:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          type: array
          items:
            $ref: '#/components/schemas/PhoneItem'
      required: [code, message, data]

    ApiResponseDauReport:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          type: array
          items:
            type: object
            properties:
              date: { type: string, example: "2026-03-07" }
              dau: { type: integer, example: 123 }
      required: [code, message, data]

    ApiResponseFeatureHotReport:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          type: array
          items:
            type: object
            properties:
              feature: { type: string, example: phone-binding-query }
              pv: { type: integer, example: 321 }
      required: [code, message, data]

    ApiResponseQueryOverview:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          $ref: '#/components/schemas/QueryOverview'
      required: [code, message, data]

    ApiResponseQuerySettings:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          $ref: '#/components/schemas/QuerySettings'
      required: [code, message, data]

    ApiResponseFamilyMember:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          $ref: '#/components/schemas/FamilyMemberItem'
      required: [code, message, data]

    ApiResponseFamilyMemberList:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          type: array
          items:
            $ref: '#/components/schemas/FamilyMemberItem'
      required: [code, message, data]

    ApiResponseMemoryList:
      type: object
      properties:
        code: { type: string, example: OK }
        message: { type: string, example: success }
        data:
          type: array
          items:
            $ref: '#/components/schemas/MemoryItem'
      required: [code, message, data]

    MemoryItem:
      type: object
      description: A durable fact the AI assistant (青鸟) has remembered about the user
      properties:
        id:
          type: integer
          format: int64
          example: 42
        content:
          type: string
          example: 用户家里有一只叫旺财的狗
        category:
          type: string
          description: Memory category
          enum: [family, vehicle, preference, habit, other]
          example: family
        createdAt:
          type: integer
          format: int64
          description: Epoch milliseconds
          example: 1772901500000
      required: [id, content, createdAt]

    CaptchaVerifyRequest:
      type: object
      properties:
        captchaProvider:
          type: string
          minLength: 1
        ticket:
          type: string
          minLength: 1
      required: [captchaProvider, ticket]

    SmsSendRequest:
      type: object
      properties:
        phone:
          type: string
          pattern: '^1\d{10}$'
        captchaToken:
          type: string
          minLength: 1
          description: >-
            Optional. Not required for a normal request. If the backend detects
            risk (e.g. the same phone number or client IP has requested an SMS
            code 2 or more times within the last 10 minutes) and no valid
            captchaToken is supplied, the request fails with error code
            CAPTCHA_REQUIRED. The client should then complete the slide
            captcha flow (/auth/captcha/slide/init + /auth/captcha/slide/verify)
            to obtain a captchaToken and retry this request with it.
      required: [phone]

    SlideCaptchaInitRequest:
      type: object
      properties:
        clientId:
          type: string
          example: android-app

    SlideCaptchaInitResponse:
      type: object
      properties:
        challengeId:
          type: string
          example: slide-5bb86e7e-37e8-4679-b23d-98db9407722a
        backgroundImageUrl:
          type: string
          description: Dynamic data URL (SVG base64) for puzzle background
          example: data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnLi4u
        sliderImageUrl:
          type: string
          description: Dynamic data URL (SVG base64) for slider block
          example: data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnLi4u
        expireAtEpochSeconds:
          type: integer
          format: int64
          example: 1772901500
      required: [challengeId, backgroundImageUrl, sliderImageUrl, expireAtEpochSeconds]

    SlideCaptchaVerifyRequest:
      type: object
      properties:
        challengeId:
          type: string
          minLength: 1
        offsetX:
          type: integer
          minimum: 0
        totalTimeMs:
          type: integer
          minimum: 1
          description: Total drag duration in milliseconds
        tracks:
          type: array
          minItems: 1
          description: Drag trajectory points sampled by client
          items:
            $ref: '#/components/schemas/SlideTrackPoint'
      required: [challengeId, offsetX, totalTimeMs, tracks]

    SlideTrackPoint:
      type: object
      properties:
        x:
          type: integer
          minimum: 0
        y:
          type: integer
          minimum: 0
        t:
          type: integer
          minimum: 0
          description: Milliseconds since drag start
      required: [x, y, t]

    LoginRequest:
      type: object
      properties:
        phone:
          type: string
          pattern: '^1\d{10}$'
        smsCode:
          type: string
          minLength: 1
      required: [phone, smsCode]

    AdminLoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        userId: { type: string, example: U13800138000 }
        accessToken: { type: string }
        refreshToken: { type: string }
      required: [userId, accessToken, refreshToken]

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
      required: [refreshToken]

    RefreshResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
      required: [accessToken, refreshToken]

    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
      additionalProperties: false

    BindingQueryRequest:
      type: object
      properties:
        phone:
          type: string
          pattern: '^1\d{10}$'
        queryType:
          type: string
          minLength: 1
          example: all
      required: [phone, queryType]

    BindingQueryResponse:
      type: object
      properties:
        phone: { type: string, example: "13800138000" }
        bankBound: { type: boolean, example: true }
        socialBound: { type: boolean, example: false }
        source: { type: string, example: provider-simulated }
        queryTimestamp: { type: integer, format: int64 }
      required: [phone, bankBound, socialBound, source, queryTimestamp]

    UserProfile:
      type: object
      properties:
        userId:
          type: string
          example: "13800138000"
        phone:
          type: string
          nullable: true
          example: "13800138000"
        nickname:
          type: string
          nullable: true
          example: "小明"
        butlerName:
          type: string
          description: Display name of the user's AI butler. Defaults to "青鸟管家" if not customized.
          example: "青鸟管家"
        butlerAvatarId:
          type: integer
          description: Avatar id for the AI butler, one of 1-8. Defaults to 1 if not customized.
          minimum: 1
          maximum: 8
          example: 1
        butlerPersona:
          type: string
          description: Tone/persona of the AI butler. Defaults to "warm" if not customized.
          enum: [warm, strict, humorous]
          example: warm
      required: [userId, phone, nickname, butlerName, butlerAvatarId, butlerPersona]

    UpdateNicknameRequest:
      type: object
      properties:
        nickname:
          type: string
          minLength: 1
          maxLength: 20
          example: "小明"
      required: [nickname]

    UpdateButlerRequest:
      type: object
      description: Partial update for AI butler identity customization. All fields are optional; only provided (non-null) fields are updated.
      properties:
        butlerName:
          type: string
          minLength: 1
          maxLength: 10
          example: "小蓝"
        butlerAvatarId:
          type: integer
          minimum: 1
          maximum: 8
          example: 5
        butlerPersona:
          type: string
