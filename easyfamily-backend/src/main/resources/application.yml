spring:
  application:
    name: easyfamily
  config:
    import:
      - optional:file:${EASYFAMILY_VAULT_FILE:./.vault.local.properties}
      - classpath:prompts.yml
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/easyfamily?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080

easyfamily:
  security:
    jwt-secret: ${EASYFAMILY_JWT_SECRET:replace-with-strong-secret-replace-with-strong-secret}
    access-token-minutes: 30
    refresh-token-days: 7
    admin-username: admin
    admin-password: ${EASYFAMILY_ADMIN_PASSWORD:Trump@666}
  query:
    cache-ttl-seconds: 86400
    daily-quota-per-user: 3
    daily-quota-per-phone: 30
    daily-quota-per-ip: 100
    prefer-redis-cache: true
    provider-key: simulated
    provider-timeout-ms: 1500
    provider-retry-times: 1
    provider-circuit-failure-threshold: 5
    provider-circuit-open-seconds: 30
    aliyun-market:
      base-url: "https://example.aliyun-market.com"
      path: "/phone/binding/query"
      app-code: ${ALIYUN_MARKET_APP_CODE:replace-with-real-appcode}
  sms:
    provider: ${SMS_PROVIDER:aliyun}
    mock-code: ${SMS_MOCK_CODE:123456}
    aliyun:
      access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
      sign-name: ${ALIYUN_SMS_SIGN_NAME:}
      template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}
      region-id: cn-hangzhou
  report:
    read-from-metric-table: true
    backfill-from-memory-on-empty: true
  ai:
    provider: ${AI_PROVIDER:deepseek}
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      model: ${DEEPSEEK_MODEL:deepseek-chat}
      timeout-ms: 15000
    qwen:
      api-key: ${QWEN_API_KEY:}
      model: ${QWEN_MODEL:qwen-turbo}
      timeout-ms: 10000
    claude:
      api-key: ${CLAUDE_API_KEY:}
      timeout-ms: 15000
  github:
    token: ${GITHUB_TOKEN:}
    repo: ${GITHUB_REPO:MikeDeng29/Easyfamily}
  mail:
    enabled: ${MAIL_ENABLED:false}
  monitor:
    enabled: ${MONITOR_ENABLED:true}
    scan-cron: "0 0 2 * * ?"
